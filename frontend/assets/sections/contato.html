<section id="contato" class="section contato">
  <div class="container">
    <div class="contato-grid">
      <div class="card contato-info">
        <h2>Contato</h2>
        <p>Tem uma dúvida ou quer parcerias? Envie uma mensagem.</p>
        <p><strong>Email:</strong> contato@chocobrand.com</p>
        <p><strong>Telefone:</strong> (11) 99999-9999</p>
      </div>
      <form class="card contato-form" id="contact-form">
        <label>
          <span>Nome</span>
          <input type="text" name="name" required />
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" required />
        </label>
        <label>
          <span>Mensagem</span>
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button class="btn" type="submit">Enviar</button>
      </form>
    </div>
  </div>
</section>
